<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard — AquaMonitor</title>
  <link rel="stylesheet" href="shared/styles.css">
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">

    <div class="page-header">
      <h1>Company Dashboard</h1>
      <p id="dash-subtitle">NordHav Aquaculture AS · Loading…</p>
      <div class="header-actions">
        <a href="sea-ops.html" class="btn btn-secondary">📋 Daily Mortality Entry</a>
        <a href="lice.html"    class="btn btn-secondary">🦐 Lice Overview</a>
      </div>
    </div>

    <div class="content-pad">

      <!-- Alerts -->
      <div id="dash-alerts"></div>

      <!-- KPIs -->
      <div id="dash-kpis" class="kpi-grid"></div>

      <!-- Site summary grid -->
      <div class="section-row mb-2"><div class="section-label">Site Status Overview</div></div>
      <div class="grid-3 mb-4" id="site-grid"></div>

      <!-- Activity + Biomass table -->
      <div class="grid-2">
        <div class="card">
          <div class="card-title">📅 Today's Activity</div>
          <table class="data-table" id="activity-table">
            <tbody></tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-title">📊 Biomass by Site</div>
          <table class="data-table">
            <thead><tr><th>Site</th><th>Biomass</th><th>MAB</th><th>Util%</th><th>Pens</th></tr></thead>
            <tbody id="biomass-table"></tbody>
          </table>
          <div class="mt-3">
            <div class="mab-label"><span>Company total</span><span id="company-total-label">— / — MAB</span></div>
            <div class="mab-bar mt-2"><div class="mab-fill" id="company-mab-fill" style="width:0%;background:var(--teal)"></div></div>
            <div class="mab-label"><span></span><span id="company-mab-pct"></span></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="modal-overlay"><div id="modal-inner" class="modal"></div></div>
<div id="toast-container"></div>
<script src="shared/db.js"></script>
<script src="shared/modal.js"></script>
<script src="shared/nav.js"></script>
<script>
renderNav('index');

function buildDashboard() {
  const sites  = DB.getAll('sites');
  const pens   = DB.getAll('pens');
  const totalBio = DB.getTotalBiomass();
  const totalMAB = DB.getTotalMAB();
  const pct = Math.round(totalBio / totalMAB * 100);
  const avgLice = DB.getCompanyAvgLice();
  const overLimit = DB.getPensOverLiceLimit(0.5);
  const activePrescriptions = DB.getActivePrescriptions();

  document.getElementById('dash-subtitle').textContent =
    `NordHav Aquaculture AS · ${sites.length} active sea sites · ${formatDate(today())}`;

  // Alerts
  const alerts = [];
  if (overLimit > 0) alerts.push(`<div class="alert red"><span class="icon">🚨</span><div class="body"><strong>${overLimit} pen(s) exceed lice limit (0.5 AF/fish).</strong> Treatment plans required within 7 days. <a href="lice.html" class="link">View Lice Management →</a></div></div>`);
  if (activePrescriptions.length > 0) alerts.push(`<div class="alert amber"><span class="icon">⚠️</span><div class="body"><strong>${activePrescriptions.length} active withdrawal period(s).</strong> Some pens have harvest blocks. <a href="health.html" class="link">View Prescriptions →</a></div></div>`);
  document.getElementById('dash-alerts').innerHTML = alerts.join('');

  // KPIs
  document.getElementById('dash-kpis').innerHTML = `
    <div class="kpi teal"><div class="label">Standing Biomass</div><div class="value">${totalBio.toLocaleString()}</div><div class="sub">tonnes · all sites</div></div>
    <div class="kpi ${pct>85?'amber':''}"><div class="label">MAB Utilisation</div><div class="value">${pct}<span style="font-size:14px">%</span></div><div class="sub">of ${totalMAB.toLocaleString()} t licensed</div></div>
    <div class="kpi green"><div class="label">Avg FCR (YTD)</div><div class="value">1.14</div><div class="sub">target 1.20</div></div>
    <div class="kpi ${avgLice>=0.4?'amber':avgLice>=0.5?'red':''}"><div class="label">Avg Lice (AF)</div><div class="value">${avgLice}</div><div class="sub">limit 0.50</div></div>
    <div class="kpi"><div class="label">Cost / kg</div><div class="value">38.40</div><div class="sub">NOK (MTD)</div></div>`;

  // Site grid cards
  document.getElementById('site-grid').innerHTML = sites.map(s => {
    const p = Math.round(s.biomass / s.mab * 100);
    const bc = p > 85 ? 'amber' : 'green';
    return `<a href="sites.html" style="text-decoration:none">
      <div class="site-card">
        <div class="site-name">${siteDot(s.liceStatus)} ${s.name}</div>
        <div class="site-meta">${s.zone} · Gen: ${s.gen} · ${s.temp}°C</div>
        <div class="site-stats">
          <div><div class="stat-label">Biomass</div><div class="stat-value">${s.biomass.toLocaleString()} t</div></div>
          <div><div class="stat-label">MAB util.</div><div class="stat-value">${p}%</div></div>
        </div>
        <div class="mt-2"><div class="mab-bar"><div class="mab-fill" style="width:${p}%;background:var(--${bc})"></div></div>
        <div class="mab-label"><span>${s.pens} pens</span><span>Lice: ${liceStatusBadge(0)}</span></div></div>
      </div></a>`;
  }).join('');

  // Biomass table
  document.getElementById('biomass-table').innerHTML = sites.map(s => {
    const p = Math.round(s.biomass / s.mab * 100);
    const bc = p > 90 ? 'red' : p > 80 ? 'amber' : 'green';
    return `<tr>
      <td>${siteDot(s.liceStatus)} ${s.name}</td>
      <td><strong>${s.biomass.toLocaleString()} t</strong></td>
      <td>${s.mab.toLocaleString()} t</td>
      <td><div class="progress-bar" style="width:90px;display:inline-block"><div class="progress-fill ${bc}" style="width:${p}%"></div></div> ${p}%</td>
      <td>${s.pens}</td></tr>`;
  }).join('');

  // MAB total
  document.getElementById('company-total-label').textContent = `${totalBio.toLocaleString()} t / ${totalMAB.toLocaleString()} t MAB`;
  document.getElementById('company-mab-fill').style.width = pct + '%';
  document.getElementById('company-mab-pct').innerHTML = `${pct}% — <span style="color:var(--${pct>90?'red':pct>80?'amber':'green'});font-weight:700">${pct>90?'APPROACHING LIMIT':pct>80?'MODERATE':'COMPLIANT'}</span>`;

  // Activity table
  const morts = DB.getRecentMortalities(1);
  const rows = [
    ...morts.map(m => {
      const site = DB.getSiteById(m.siteId); const pen = DB.get('pens', m.penId);
      return { dot:'dot-green', text:`${site?.name||''} ${pen?.name||''} — ${m.deadFish} mortalities recorded (${m.cause})`, time:'08:00' };
    }),
    { dot:'dot-amber', text:'Feed delivery — BIOMAR 9mm 48 t (Rognøy barge)', time:'09:32' },
  ];
  document.getElementById('activity-table').innerHTML = rows.map(r =>
    `<tr><td><span class="dot ${r.dot}"></span></td><td>${r.text}</td><td class="text-muted text-sm">${r.time}</td></tr>`
  ).join('');
}

buildDashboard();
</script>
</body>
</html>
