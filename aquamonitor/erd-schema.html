// RENDERING HELPERS
// ════════════════════════════════════════════════════════════════
const DOMAIN_META = {
  core: { label:'Core Infrastructure', color:'#005A9E', bg:'#EBF5FF' },
  bio:  { label:'Biological Ops',      color:'#006E5A', bg:'#F0FAF8' },
  hlth: { label:'Health & Treatment',  color:'#C02020', bg:'#FFF0EB' },
  life: { label:'Fish Lifecycle',      color:'#600070', bg:'#F9EEFF' },
  env:  { label:'Env & Compliance',    color:'#006050', bg:'#EDFAF7' },
};

function flagBadge(flags) {
  return flags.split(' ').filter(Boolean).map(f => {
    const cls = f==='PK'?'badge-pk':f==='FK'?'badge-fk':f==='REQ'?'badge-req':f==='CALC'?'badge-calc':f==='CRIT'?'badge-crit':'';
    return cls ? `<span class="${cls}">${f}</span>` : '';
  }).join(' ');
}

function buildTableCard(t) {
  const dm = DOMAIN_META[t.domain];
  const rulesHtml = t.businessRules ? `<div style="margin:8px 12px 0;padding:8px 12px;background:#FFF9E6;border:1px solid #F0D060;border-radius:6px;font-size:11.5px;color:#555">
    <strong>⚠️ Business Rules:</strong><ul style="margin:4px 0 0 0;padding-left:16px">${t.businessRules.map(r=>`<li>${r}</li>`).join('')}</ul>
  </div>` : '';
  return `
  <div class="tbl-card">
    <div class="tbl-header" style="background:${dm.bg}">
      <div>
        <div class="tbl-name">${t.name}</div>
        <div class="tbl-display">${t.display}</div>
        <div class="tbl-desc">${t.desc}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span class="domain-tag d-${t.domain}">${dm.label}</span><br>
        <div class="req-chips mt-1">${t.reqs.split(', ').map(r=>`<span class="req-chip">${r}</span>`).join('')}</div>
        <div style="font-size:11px;color:#888;margin-top:4px">${t.cols.length} columns · PK: <code style="font-size:10px">${t.pk}</code></div>
      </div>
    </div>
    ${rulesHtml}
    <div style="overflow-x:auto">
    <table class="schema-table">
      <thead><tr><th>Column</th><th>Type</th><th>Flags</th><th>Description</th></tr></thead>
      <tbody>
        ${t.cols.map(([nm,tp,fl,ds])=>`
          <tr ${fl.includes('PK')?'class="pk-row"':''}>
            <td class="col-name">${nm}</td>
            <td class="col-type">${tp}</td>
            <td style="white-space:nowrap">${flagBadge(fl)}</td>
            <td class="col-desc">${ds||'–'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

  let html = `<div class="card mb-3" style="border-left:4px solid var(--teal);background:#F0FAF8">

    <p class="text-sm mb-2">Publisher prefix: <code>nha_</code> · Version 1.0 (2026-02-22) · All tables include standard Dataverse audit columns (createdon, modifiedon, createdby, modifiedby, statecode, statuscode)</p>
    <div class="legend-row" style="display:flex;gap:12px;flex-wrap:wrap">
      ${Object.entries(DOMAIN_META).map(([k,v])=>`<span class="domain-tag d-${k}" style="font-size:12px;padding:3px 12px">${v.label} (${counts[k]||0})</span>`).join('')}
    </div>
  </div>
  <div class="summary-grid">
    ${TABLES.map(t=>`<div class="summary-card">
      <div class="summary-tname">${t.name}</div>
      <div class="summary-disp">${t.display}</div>
      <div class="summary-meta"><span class="domain-tag d-${t.domain}">${DOMAIN_META[t.domain].label}</span> · ${t.cols.length} cols · ${t.reqs}</div>
    </div>`).join('')}
  </div>`;
  document.getElementById('t0').innerHTML = html;
}

function buildDomainTab(tabId, domain) {
  const el = document.getElementById(tabId);
  if (el.dataset.built) return;
  el.dataset.built = '1';
  el.innerHTML = TABLES.filter(t=>t.domain===domain).map(buildTableCard).join('');
}

function buildChoicesTab() {
  const el = document.getElementById('t6');
  if (el.dataset.built) return;
  el.dataset.built = '1';

  // Choice sets
  let html = `<div class="section-label mb-2">Choice Sets (Option Sets) — ${CHOICES.length} sets</div>`;
  html += CHOICES.map(c=>`<div class="choice-card">
    <div style="font-family:monospace;font-weight:700;font-size:13px;color:#003366">${c.name}</div>
    <div class="option-list">${c.opts.map(o=>`<span class="option-pill">${o}</span>`).join('')}</div>
  </div>`).join('');

  // Virtual Entities
  html += `<div class="section-label mb-2 mt-4">Virtual Entities — D365 F&O surfaces in Dataverse (${VE.length} entities)</div>`;
  html += `<p class="text-sm mb-3" style="color:#555">Virtual entities are read-only Dataverse tables backed by D365 F&O OData entities. They surface ERP data in MDA context without data duplication. Configure via: <strong>Settings → Administration → Virtual entity data sources</strong></p>`;
  html += VE.map(v=>`<div class="ve-card">
    <div style="font-family:monospace;font-weight:700;font-size:13px;color:#400050">${v.name}</div>
    <div style="font-size:12px;color:#555;margin-top:2px">Source: <code>${v.src}</code></div>
    <div style="font-size:12px;color:#333;margin-top:4px">${v.purpose}</div>
    <div style="font-size:11px;color:#777;margin-top:4px">Key columns: <code>${v.keys}</code></div>
  </div>`).join('');

  // Power Automate Flows
  html += `<div class="section-label mb-2 mt-4">Power Automate Flows — ${FLOWS.length} automated flows</div>`;
  html += FLOWS.map(f=>`<div class="flow-card">
    <div class="flow-id">${f.id} &nbsp; <strong style="font-size:13px;color:#111">${f.name}</strong> &nbsp;
      <span class="chip" style="font-size:11px">${f.freq}</span></div>
    <div class="flow-trigger">⚡ Trigger: ${f.trigger}</div>
    <div class="flow-action">→ ${f.action}</div>
  </div>`).join('');

  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════════════════════════
const TAB_BUILDERS = [
  () => {},  // 0 already built
  () => buildDomainTab('t1','core'),
  () => buildDomainTab('t2','bio'),
  () => buildDomainTab('t3','hlth'),
  () => buildDomainTab('t4','life'),
  () => buildDomainTab('t5','env'),
  () => buildChoicesTab(),
];

function sw(idx, el) {
  [0,1,2,3,4,5,6].forEach(i => document.getElementById('t'+i).style.display = i===idx ? 'block' : 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  TAB_BUILDERS[idx]();
}

// Initial render
buildSummary();
</script>
</body>
</html>
