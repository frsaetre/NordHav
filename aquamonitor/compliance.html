<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Compliance &amp; Regulatory — AquaMonitor</title>
  <link rel="stylesheet" href="shared/styles.css">
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <div class="page-header">
      <h1>Compliance &amp; Regulatory Reporting</h1>
      <p>AQU-055–063 — BarentsWatch, Altinn, Fiskeridirektoratet, MATS submissions</p>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(0,this)">📋 Report Status</div>
      <div class="tab"        onclick="switchTab(1,this)">🔗 Integration Flows</div>
      <div class="tab"        onclick="switchTab(2,this)">🐟 Escape Events</div>
    </div>

    <div id="tab-0" class="content-pad">
      <div id="compliance-summary" class="kpi-row mb-3"></div>
      <div id="report-table"></div>
    </div>
    <div id="tab-1" class="content-pad" style="display:none;"><div id="int-content"></div></div>
    <div id="tab-2" class="content-pad" style="display:none;">
      <div class="page-header" style="padding:0 0 16px 0;">
        <div></div>
        <div class="header-actions"><button class="btn btn-primary" onclick="openEscapeModal()">+ Record Escape Event</button></div>
      </div>
      <div id="escape-table"></div>
    </div>
  </div>
</div>
<div id="modal-overlay"><div id="modal-inner" class="modal"></div></div>
<div id="toast-container"></div>
<script src="shared/db.js"></script>
<script src="shared/modal.js"></script>
<script src="shared/nav.js"></script>
<script>
renderNav('compliance');

function switchTab(idx, el) {
  [0,1,2].forEach(i=>{ document.getElementById('tab-'+i).style.display=i===idx?'block':'none'; });
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  if (idx===1) renderIntegrations();
  if (idx===2) renderEscapes();
}

const REPORTS = [
  {id:1, name:'Weekly Sea Lice Report', deadline:'Monday 12:00', authority:'BarentsWatch/Mattilsynet', format:'API JSON', lastSubmitted:'2026-03-10', status:'Submitted', week:'W10-2026'},
  {id:2, name:'Monthly Mortality Report', deadline:'5th of month', authority:'Fiskeridirektoratet', format:'Altinn XML', lastSubmitted:'2026-03-05', status:'Submitted', week:'Feb-2026'},
  {id:3, name:'Annual Production Report', deadline:'31 Jan', authority:'Fiskeridirektoratet', format:'Altinn XML', lastSubmitted:'2026-01-30', status:'Submitted', week:'FY2025'},
  {id:4, name:'PAH Environmental Report', deadline:'Quarterly', authority:'Statsforvalteren', format:'Email PDF', lastSubmitted:'2026-01-15', status:'Submitted', week:'Q4-2025'},
  {id:5, name:'Disease Notification', deadline:'Within 24h', authority:'Mattilsynet', format:'Altinn', lastSubmitted:'—', status:'N/A — no events', week:'—'},
  {id:6, name:'Escape Notification', deadline:'Within 1h', authority:'Fiskeridirektoratet', format:'Altinn', lastSubmitted:'—', status:'N/A — no events', week:'—'},
  {id:7, name:'MATS Anti-Parasite Treatment', deadline:'Before treatment', authority:'Mattilsynet MATS', format:'MATS Portal', lastSubmitted:'2026-03-08', status:'Submitted', week:'W10-2026'},
  {id:8, name:'Quality Audit Declaration', deadline:'Each delivery', authority:'Mattilsynet', format:'Internal + D365 BO', lastSubmitted:'2026-03-05', status:'Submitted', week:'HP-007'},
];

function renderReportStatus() {
  const overdue = REPORTS.filter(r=>r.status.toLowerCase().includes('overdue'));
  const pending = REPORTS.filter(r=>r.status.toLowerCase().includes('pending'));
  document.getElementById('compliance-summary').innerHTML = `
    <div class="kpi-tile green"><div class="kpi-val">${REPORTS.filter(r=>r.status==='Submitted').length}</div><div class="kpi-label">Submitted This Period</div></div>
    <div class="kpi-tile ${pending.length?'amber':'green'}"><div class="kpi-val">${pending.length}</div><div class="kpi-label">Pending</div></div>
    <div class="kpi-tile ${overdue.length?'red':'green'}"><div class="kpi-val">${overdue.length}</div><div class="kpi-label">Overdue</div></div>
    <div class="kpi-tile"><div class="kpi-val">${DB.count('escapeEvents')}</div><div class="kpi-label">Escape Events (YTD)</div></div>`;

  document.getElementById('report-table').innerHTML = buildTable([
    {label:'Report',        render:r=>`<strong>${r.name}</strong>`},
    {label:'Ref. Period',   key:'week'},
    {label:'Deadline',      key:'deadline'},
    {label:'Authority',     key:'authority'},
    {label:'Format',        render:r=>`<span class="chip">${r.format}</span>`},
    {label:'Last Submitted',render:r=>r.lastSubmitted==='—'?'<span class="text-muted">N/A</span>':formatDate(r.lastSubmitted)},
    {label:'Status',        render:r=>r.status==='Submitted'?'<span class="badge-pill badge-green">✅ Submitted</span>':r.status.includes('N/A')?'<span class="badge-pill badge-grey">N/A</span>':'<span class="badge-pill badge-amber">⏳ Pending</span>'},
  ], REPORTS, {emptyIcon:'📋', emptyText:'No reports'});
}

function renderIntegrations() {
  document.getElementById('int-content').innerHTML = `
    <div class="section-label mb-2">Active Integration Channels</div>
    <div class="grid-3 mb-4">
      <div class="card">
        <div class="card-title">🐟 BarentsWatch API</div>
        <p class="text-sm mb-2">Weekly sea lice submission, vessel positions, location data. AQU uses OAuth2 client credentials to POST weekly count data every Monday before 12:00.</p>
        <div class="int-flow"><span class="int-box teal">AquaMonitor<br>lice.html</span><span class="int-arrow">→ REST POST /reporting/sealice/weekly →</span><span class="int-box" style="background:#D4F1E4">BarentsWatch</span></div>
        <div class="badge-pill badge-green mt-2" style="display:inline-block">✅ Connected</div>
      </div>
      <div class="card">
        <div class="card-title">🏛️ Altinn3 / Fiskeridirektoratet</div>
        <p class="text-sm mb-2">Monthly mortality reports, escape notifications, annual production totals. XML payload posted via Altinn3 Correspondence API. Requires Maskinporten auth.</p>
        <div class="int-flow"><span class="int-box teal">AquaMonitor</span><span class="int-arrow">→ Maskinporten JWT →</span><span class="int-box" style="background:#E8F4FD">Altinn3</span></div>
        <div class="badge-pill badge-green mt-2" style="display:inline-block">✅ Connected</div>
      </div>
      <div class="card">
        <div class="card-title">📊 MATS Portal</div>
        <p class="text-sm mb-2">Anti-parasite treatment pre-notification and post-treatment reporting. Submitted before each bath treatment, extracted from prescription records in AquaMonitor.</p>
        <div class="int-flow"><span class="int-box teal">lice.html<br>Prescription</span><span class="int-arrow">→ HTTPS form POST →</span><span class="int-box" style="background:#FFF3CD">MATS</span></div>
        <div class="badge-pill badge-green mt-2" style="display:inline-block">✅ Connected</div>
      </div>
      <div class="card">
        <div class="card-title">💼 D365 Finance Integration</div>
        <p class="text-sm mb-2">Biological asset journals, production orders, harvest completion posting. X++ OData connection with custom <code>aqua_*</code> entities for fish count and biomass tracking.</p>
        <div class="int-flow"><span class="int-box teal">AquaMonitor<br>DB Collections</span><span class="int-arrow">→ OData API →</span><span class="int-box d365">D365 F&O<br>Biological Assets</span></div>
        <div class="badge-pill badge-green mt-2" style="display:inline-block">✅ Connected</div>
      </div>
      <div class="card">
        <div class="card-title">📈 Power BI Dataset</div>
        <p class="text-sm mb-2">Live reporting dashboard sourced from AquaMonitor DB via Power BI Dataflow. Refreshes nightly. Covers biomass, mortality trends, lice levels, FCR, cost/kg.</p>
        <div class="int-flow"><span class="int-box teal">DB.js</span><span class="int-arrow">→ REST connector →</span><span class="int-box" style="background:#F9E4FF">Power BI</span></div>
        <div class="badge-pill badge-amber mt-2" style="display:inline-block">⏳ Config in progress</div>
      </div>
      <div class="card">
        <div class="card-title">☁️ Azure Key Vault</div>
        <p class="text-sm mb-2">All API secrets (BarentsWatch client secret, D365 app registration, Altinn Maskinporten key) stored in Azure Key Vault and injected at runtime via managed identity.</p>
        <div class="int-flow"><span class="int-box teal">Server Runtime</span><span class="int-arrow">→ Managed Identity →</span><span class="int-box" style="background:#E4F0FF">Azure KV</span></div>
        <div class="badge-pill badge-green mt-2" style="display:inline-block">✅ Configured</div>
      </div>
    </div>`;
}

function renderEscapes() {
  const events = DB.getAll('escapeEvents');
  document.getElementById('escape-table').innerHTML = buildTable([
    {label:'Event ID',    render:r=>`ESC-${String(r.id).padStart(4,'0')}`},
    {label:'Site',        render:r=>DB.getSiteById(r.siteId)?.name||'—'},
    {label:'Date',        render:r=>formatDate(r.date)},
    {label:'Species',     key:'species'},
    {label:'Est. Number', render:r=>r.count.toLocaleString()},
    {label:'Cause',       key:'cause'},
    {label:'Altinn Ref',  render:r=>r.altinnRef?`<a class="link" target="_blank">${r.altinnRef}</a>`:'<span class="badge-pill badge-red">Not submitted</span>'},
    {label:'Status',      render:r=>badgeStatus(r.status)},
  ], events, {
    actions: r=>`<button class="btn btn-sm btn-secondary" onclick="submitEscape(${r.id})" ${r.altinnRef?'disabled':''}>📤 Submit Altinn</button>`,
    emptyIcon:'🐟', emptyText:'No escape events recorded — excellent track record.',
  });
}

function openEscapeModal() {
  const siteOpts = DB.getAll('sites').map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  openFormModal({ title:'🐟 Record Escape Event', headerClass:'red', size:'lg', bodyHtml:`
    <div class="alert red mb-3"><span>⚠️</span><div><strong>Mandatory notification — within 1 hour.</strong> Immediately notify Fiskeridirektoratet via Altinn once this is saved.</div></div>
    <div class="form-grid form-grid-2">
      <div class="field"><label class="required">Site</label><select id="esc-site">${siteOpts}</select></div>
      <div class="field"><label class="required">Date &amp; Time</label><input id="esc-date" type="datetime-local" value="${today()}T08:00"></div>
      <div class="field"><label>Species</label><select id="esc-species"><option>Atlantic Salmon</option><option>Rainbow Trout</option></select></div>
      <div class="field"><label class="required">Estimated Number</label><input id="esc-count" type="number" min="1"></div>
      <div class="field" style="grid-column:span 2"><label>Cause / Description</label><textarea id="esc-cause" rows="2" placeholder="Net failure, storm, predator, etc."></textarea></div>
    </div>`,
    saveLabel:'Record &amp; Submit Altinn', saveBtnClass:'btn-danger',
    onSave:()=>{
      DB.add('escapeEvents',{siteId:parseInt(fval('esc-site')),date:fval('esc-date')||today(),species:fval('esc-species'),count:fint('esc-count')||0,cause:fval('esc-cause'),altinnRef:null,status:'Pending Submission'});
      showToast('⚠️ Escape event recorded — submit Altinn notification IMMEDIATELY','error');
      renderEscapes(); return true;
    }
  });
}

function submitEscape(id) {
  openConfirm({title:'Submit to Altinn3', message:'Send official escape notification to Fiskeridirektoratet via Altinn3?', confirmLabel:'Submit Now', confirmClass:'btn-primary',
    onConfirm:()=>{
      const ref = 'ALTINN-2026-'+String(1000+id);
      DB.update('escapeEvents',id,{altinnRef:ref,status:'Submitted'});
      showToast(`Escape notification submitted — Altinn ref: ${ref}`,'success');
      renderEscapes();
    }
  });
}

renderReportStatus();
</script>
</body>
</html>
